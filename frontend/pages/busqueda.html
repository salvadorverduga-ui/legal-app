<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Busque abogados verificados por especialidad, caso o provincia en Ecuador.">
  <title>Buscar abogados — LegalEC</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

  <header class="encabezado">
    <div class="contenedor encabezado__contenedor">
      <a href="/" class="logo" aria-label="LegalEC — Inicio">
        <span class="logo__nombre">LegalEC</span>
      </a>
      <nav class="nav-usuario" aria-label="Menú de usuario"></nav>
    </div>
  </header>

  <main>

    <!-- Barra de búsqueda sticky -->
    <section class="barra-busqueda" aria-label="Filtros de búsqueda">
      <div class="contenedor">
        <form id="formBusqueda" class="form-busqueda" novalidate>
          <div class="form-busqueda__campos">

            <!-- Eje 0: Nombre del abogado o del estudio -->
            <div class="campo">
              <label for="filtroNombre" class="campo__etiqueta">Buscar por nombre</label>
              <input
                type="text"
                id="filtroNombre"
                name="nombre"
                class="campo__input"
                placeholder="Nombre del abogado o del estudio"
                maxlength="150"
                autocomplete="off"
              >
            </div>

            <!-- Eje 1: Especialidad -->
            <div class="campo">
              <label for="filtroEspecialidad" class="campo__etiqueta">Especialidad</label>
              <input
                type="text"
                id="filtroEspecialidad"
                name="especialidad"
                class="campo__input"
                placeholder="Ej: Derecho de familia"
                list="listaEspecialidades"
                autocomplete="off"
              >
              <datalist id="listaEspecialidades">
                <option value="Derecho de familia">
                <option value="Derecho laboral">
                <option value="Derecho penal">
                <option value="Derecho civil">
                <option value="Derecho mercantil">
                <option value="Derecho administrativo">
                <option value="Derecho tributario">
                <option value="Derecho inmobiliario">
                <option value="Derecho de tránsito">
                <option value="Derecho constitucional">
                <option value="Derecho ambiental">
                <option value="Propiedad intelectual">
                <option value="Derecho internacional">
                <option value="Derecho migratorio">
              </datalist>
            </div>

            <!-- Eje 2: Caso frecuente -->
            <div class="campo">
              <label for="filtroCaso" class="campo__etiqueta">Caso frecuente</label>
              <input
                type="text"
                id="filtroCaso"
                name="caso_frecuente"
                class="campo__input"
                placeholder="Ej: Divorcio, Herencia"
                list="listaCasos"
                autocomplete="off"
              >
              <datalist id="listaCasos">
                <option value="Divorcio">
                <option value="Herencia">
                <option value="Pensión alimenticia">
                <option value="Despido injustificado">
                <option value="Accidente de tránsito">
                <option value="Recuperación de deudas">
                <option value="Contratos">
                <option value="Custodia de hijos">
                <option value="Defensa penal">
                <option value="Trámites migratorios">
                <option value="Compra-venta de bienes inmuebles">
                <option value="Delitos informáticos">
                <option value="Estafa">
              </datalist>
            </div>

            <!-- Eje 3: Provincia -->
            <div class="campo">
              <label for="filtroProvincia" class="campo__etiqueta">Provincia</label>
              <select id="filtroProvincia" name="provincia" class="campo__input">
                <option value="">Todas las provincias</option>
              </select>
            </div>

          </div><!-- /campos -->

          <div class="form-busqueda__acciones">
            <button type="submit" class="btn btn--primario">Buscar</button>
            <button type="button" class="btn btn--secundario btn--sm" id="btnLimpiar">
              Ver todos
            </button>
          </div>
        </form>

        <!-- Filtro por tipo de perfil -->
        <div class="filtro-tipo" role="group" aria-label="Tipo de perfil">
          <span class="filtro-tipo__label">Tipo:</span>
          <button class="filtro-tipo__btn filtro-tipo__btn--activo" data-tipo="" type="button">
            Todos
          </button>
          <button class="filtro-tipo__btn" data-tipo="individual" type="button">
            Individual
          </button>
          <button class="filtro-tipo__btn" data-tipo="estudio" type="button">
            Estudio
          </button>
          <button class="filtro-tipo__btn" data-tipo="red" type="button">
            Red
          </button>
        </div>

        <!-- Chips de filtros activos -->
        <div class="filtros-activos" id="filtrosActivos" aria-label="Filtros aplicados" aria-live="polite"></div>

      </div>
    </section>

    <!-- Resultados -->
    <section class="seccion-resultados" aria-label="Resultados de búsqueda">
      <div class="contenedor">

        <div class="resultados-cabecera">
          <p class="conteo-resultados" id="conteoResultados" aria-live="polite"></p>
        </div>

        <!-- Estado: cargando -->
        <div class="cargando-resultados" id="estadoCargando" hidden aria-live="polite">
          <div class="spinner" aria-hidden="true"></div>
          <span>Buscando abogados...</span>
        </div>

        <!-- Estado: vacío -->
        <div class="estado-vacio" id="estadoVacio" hidden>
          <p class="estado-vacio__titulo">No encontramos resultados</p>
          <p>Intente con otros filtros o <button class="btn btn--secundario btn--sm" id="btnVerTodos" type="button">vea todos los abogados disponibles</button>.</p>
        </div>

        <!-- Estado: error -->
        <div class="estado-vacio" id="estadoError" hidden>
          <p class="estado-vacio__titulo">Ocurrió un error al cargar los resultados</p>
          <p>
            <button class="btn btn--secundario btn--sm" id="btnReintentar" type="button">
              Reintentar
            </button>
          </p>
        </div>

        <!-- Grid de tarjetas -->
        <div class="grid-resultados" id="gridResultados" role="list" aria-label="Abogados disponibles"></div>

      </div>
    </section>

  </main>

  <footer class="pie">
    <div class="contenedor pie__contenedor">
      <p class="pie__aviso">
        LegalEC es un servicio de conexión y no un proveedor de servicios jurídicos.
      </p>
      <nav class="pie__nav" aria-label="Páginas legales">
        <a href="#" class="pie__enlace">Términos y condiciones</a>
        <span class="pie__separador" aria-hidden="true">·</span>
        <a href="#" class="pie__enlace">Política de privacidad (LOPDP)</a>
        <span class="pie__separador" aria-hidden="true">·</span>
        <a href="/pages/contacto" class="pie__enlace">Soporte</a>
      </nav>
    </div>
  </footer>

  <script src="/js/vendors/supabase.min.js"></script>
  <script type="module" src="/js/busqueda.js"></script>

</body>
</html>
